  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="hm-preloader">
    <div class="preloader-logo-wrap">
      <div class="preloader-logo first-logo">
        <div class="preloader-eyebrow">Pénzügyi főtanácsadó</div>
        <span class="logo-nev">Balogh Richárd</span>
        <div class="preloader-dekor-vonal"></div>
      </div>
      <div class="preloader-logo second-logo">
        <div class="preloader-eyebrow">Pénzügyi főtanácsadó</div>
        <span class="logo-nev">Balogh Richárd</span>
        <div class="preloader-dekor-vonal"></div>
      </div>
    </div>
    <div class="preloader-progress-bar">
      <div class="preloader-progress-fill"></div>
    </div>
  </div>
  <div id="root"></div>
  <script>
    (function() {
      var fill       = document.querySelector('.preloader-progress-fill');
      var preloader  = document.getElementById('hm-preloader');
      var firstLogo  = document.querySelector('.first-logo');
      var secondLogo = document.querySelector('.second-logo');
      var currentPct = 0;
      var trickleId  = null;

      function setProgress(pct) {
        if (!fill || pct <= currentPct) return;
        currentPct = pct;
        fill.style.width = pct + '%';
      }

      function startTrickle(cap, interval, step) {
        stopTrickle();
        trickleId = setInterval(function() {
          if (currentPct < cap) setProgress(Math.min(cap, currentPct + step));
          else stopTrickle();
        }, interval);
      }

      function stopTrickle() {
        if (trickleId) { clearInterval(trickleId); trickleId = null; }
      }

      function launch() {
        // Két frame után indul — az első festés után, hogy a transition látszódjon
        requestAnimationFrame(function() {
          requestAnimationFrame(function() {
            setProgress(8);
            startTrickle(55, 200, 3);   // trickle 55%-ig amíg DCL vár
          });
        });
      }

      // DOMContentLoaded: 60%
      document.addEventListener('DOMContentLoaded', function() {
        stopTrickle();
        setProgress(60);
        startTrickle(90, 400, 2);       // trickle 90%-ig amíg window.load vár
      });

      // window.load: 100% — minden kész, majd wipe + slide-out
      window.addEventListener('load', function() {
        stopTrickle();
        setProgress(100);

        setTimeout(function() {
          if (firstLogo)  firstLogo.classList.add('wipe-out');
          if (secondLogo) secondLogo.classList.add('wipe-in');

          setTimeout(function() {
            if (preloader) preloader.classList.add('slide-out');

            var delays = [
              ['.hero-foim',         0  ],
              ['.hero-meta',         100],
              ['.hero-sub',          200],
              ['.hero-precalc-card', 400],
              ['.gorgessen-jelzo',   700],
            ];
            delays.forEach(function(item) {
              setTimeout(function() {
                var el = document.querySelector(item[0]);
                if (el) el.classList.add('visible');
              }, item[1]);
            });

            setTimeout(function() {
              if (preloader) preloader.style.display = 'none';
            }, 400);

          }, 450);
        }, 350);
      });

      launch();
    })();
  </script>

  <script src="data.js?v=24"></script>
  <script type="text/babel" src="tweaks-panel.jsx?v=24"></script>

  <script type="text/babel" src="sections-bottom.jsx?v=24"></script>
  <script type="text/babel" src="app.jsx?v=24"></script>
</body>
</html>
